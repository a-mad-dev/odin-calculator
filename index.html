<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="calculator">
        <div class="displaybox">
          <input type="text" class="display" value="0" readonly />
        </div>
        <div class="buttons">
          <button class="btns num" type="button">7</button>
          <button class="btns num" type="button">8</button>
          <button class="btns num" type="button">9</button>
          <button class="btns op" type="button">+</button>
          <button class="btns num" type="button">4</button>
          <button class="btns num" type="button">5</button>
          <button class="btns num" type="button">6</button>
          <button class="btns op" type="button">-</button>
          <button class="btns num" type="button">1</button>
          <button class="btns num" type="button">2</button>
          <button class="btns num" type="button">3</button>
          <button class="btns op" type="button">*</button>
          <button class="btns cls" type="button">C</button>
          <button class="btns num" type="button">0</button>
          <button class="btns eq" type="button">=</button>
          <button class="btns op" type="button">/</button>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
